<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0079bf" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="赢在执行" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>《赢在执行》专项培训心得体会电子书</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>赢在执行</h1>
            <p>专项培训心得体会电子书</p>
          </div>
        </div>
        <nav class="toolbar" aria-label="电子书工具栏">
          <button id="installBtn" class="icon-btn text-btn install-btn" title="安装到桌面" aria-label="安装到桌面" hidden>安装</button>
          <button id="tocBtn" class="icon-btn text-btn" title="目录" aria-label="目录">目录</button>
          <button id="prevBtn" class="icon-btn" title="上一页" aria-label="上一页">‹</button>
          <button id="nextBtn" class="icon-btn" title="下一页" aria-label="下一页">›</button>
          <label class="zoom-control" title="缩放">
            <span>缩放</span>
            <input id="zoomRange" type="range" min="82" max="122" value="100" />
          </label>
          <button id="fullscreenBtn" class="icon-btn" title="全屏" aria-label="全屏">⛶</button>
          <a class="icon-btn text-btn" href="./assets/执行力心得体会汇编.pdf" download>PDF</a>
        </nav>
      </header>

      <main class="stage">
        <aside id="tocPanel" class="toc-panel" aria-label="文章目录">
          <div class="toc-head">
            <strong>目录</strong>
            <button id="closeTocBtn" class="mini-btn" aria-label="关闭目录">×</button>
          </div>
          <div id="tocList" class="toc-list"></div>
        </aside>

        <section class="reader-wrap">
          <div id="book" class="book" aria-live="polite">
            <article class="page-slot left-page">
              <img id="leftPage" alt="" draggable="false" />
            </article>
            <article class="page-slot right-page">
              <img id="rightPage" alt="" draggable="false" />
            </article>
          </div>
          <div class="reader-footer">
            <button id="firstBtn" class="mini-btn">封面</button>
            <div class="progress">
              <div id="progressBar"></div>
            </div>
            <span id="pageIndicator">1 / 77</span>
            <button id="lastBtn" class="mini-btn">封底</button>
          </div>
        </section>
      </main>
    </div>

    <script src="./ebook-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
